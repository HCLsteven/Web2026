<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>資工選課表</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 24px;
      background: #fff;
    }

    .wrap {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .left-panel {
      flex: 1.2;
      min-width: 520px;
    }

    .right-panel {
      flex: 1;
      min-width: 360px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      background: #fafafa;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: 32px;
    }

    table {
      font-family: Arial, Helvetica, sans-serif;
      border-collapse: collapse;
      width: 100%;
    }

    td, th {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tr:hover {
      background-color: #ddd;
    }

    th {
      padding-top: 12px;
      padding-bottom: 12px;
      background-color: #04AA6D;
      color: white;
    }

    .course-link {
      border: none;
      background: none;
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      color: #111;
    }

    .course-link:hover {
      color: #04AA6D;
      text-decoration: underline;
    }

    .btn-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
    }

    button.action-btn {
      padding: 8px 14px;
      border: 1px solid #999;
      background: #fff;
      cursor: pointer;
      border-radius: 4px;
    }

    button.action-btn:hover {
      background: #f0f0f0;
    }

    .detail-title {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 28px;
    }

    .detail-row {
      padding: 10px 0;
      border-bottom: 1px solid #e3e3e3;
    }

    .detail-label {
      display: inline-block;
      width: 110px;
      font-weight: bold;
      color: #333;
    }

    .hint {
      color: #777;
    }

    .detail-link {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 12px;
      background: #04AA6D;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }

    .detail-link:hover {
      background: #03895a;
    }

    .modal-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 999;
    }

    .modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      width: 420px;
      max-width: calc(100vw - 40px);
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      z-index: 1000;
      padding: 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .modal-title {
      margin: 0;
      font-size: 24px;
    }

    .close-btn {
      border: none;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
    }

    .modal-row {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="left-panel">
      <h1>資工選課表</h1>

      <table id="csie">
        <tr>
          <th>開課單位</th>
          <th>課程名稱</th>
          <th>授課教師</th>
        </tr>
        <tr>
          <td>資工系</td>
          <td><button class="course-link" onclick="showCourse('A2337')">物件導向軟體設計</button></td>
          <td>黃崇源</td>
        </tr>
        <tr>
          <td>資工系</td>
          <td><button class="course-link" onclick="showCourse('B1201')">計算機網路實驗</button></td>
          <td>李春良</td>
        </tr>
        <tr>
          <td>資工系</td>
          <td><button class="course-link" onclick="showCourse('C3402')">作業系統實務</button></td>
          <td>張哲維</td>
        </tr>
        <tr>
          <td>資工系</td>
          <td><button class="course-link" onclick="showCourse('D4403')">生物統計</button></td>
          <td>陳光武</td>
        </tr>
        <tr>
          <td>資工系</td>
          <td><button class="course-link" onclick="showCourse('E5504')">通訊系統</button></td>
          <td>陳仁暉</td>
        </tr>
        <tr>
          <td>資工系</td>
          <td><button class="course-link" onclick="showCourse('F6605')">軟硬體專題(2)</button></td>
          <td>魏志達</td>
        </tr>
      </table>

      <div class="btn-row">
        <button class="action-btn" onclick="changeResult()">Change</button>
        <button class="action-btn" onclick="openModal()">Open Popover</button>
      </div>
    </div>

    <div class="right-panel" id="detailPanel">
      <h2 class="detail-title">課程詳細資料</h2>
      <p class="hint">請點左邊課程名稱查看詳細內容。</p>
    </div>
  </div>

  <div class="modal-mask" id="modalMask" onclick="closeModal()"></div>

  <div class="modal" id="courseModal">
    <div class="modal-header">
      <h3 class="modal-title">課程詳細資料</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div id="modalContent">
      <p class="hint">請先點選左側課程名稱。</p>
    </div>
  </div>

  <script>
    const courseData = {
      A2337: {
        semester: "114/2",
        teacher: "黃崇源",
        department: "資工系",
        gradeClass: "3-甲",
        courseCode: "IT3004(3)",
        title: "物件導向軟體設計",
        sectionId: "A2337",
        time: "星期五 2 (09:10) ~ 4 (12:00)",
        classroom: "資工系電腦教室2",
        note: "每週上課",
        url: "https://catalog.cgu.edu.tw/coursedata?sectionid=A2337"
      },
      B1201: {
        semester: "114/2",
        teacher: "李春良",
        department: "資工系",
        gradeClass: "3-甲",
        courseCode: "IT3101(1)",
        title: "計算機網路實驗",
        sectionId: "B1201",
        time: "星期三 3 ~ 4",
        classroom: "資工系實驗室",
        note: "實驗課",
        url: "https://catalog.cgu.edu.tw/coursedata?sectionid=B1201"
      },
      C3402: {
        semester: "114/2",
        teacher: "張哲維",
        department: "資工系",
        gradeClass: "3-甲",
        courseCode: "IT3202(3)",
        title: "作業系統實務",
        sectionId: "C3402",
        time: "星期二 1 ~ 3",
        classroom: "工學大樓 E202",
        note: "每週上課",
        url: "https://catalog.cgu.edu.tw/coursedata?sectionid=C3402"
      },
      D4403: {
        semester: "114/2",
        teacher: "陳光武",
        department: "資工系",
        gradeClass: "3-甲",
        courseCode: "IT3303(2)",
        title: "生物統計",
        sectionId: "D4403",
        time: "星期四 6 ~ 7",
        classroom: "教室 B101",
        note: "每週上課",
        url: "https://catalog.cgu.edu.tw/coursedata?sectionid=D4403"
      },
      E5504: {
        semester: "114/2",
        teacher: "陳仁暉",
        department: "資工系",
        gradeClass: "3-甲",
        courseCode: "IT3404(3)",
        title: "通訊系統",
        sectionId: "E5504",
        time: "星期一 6 ~ 8",
        classroom: "工學大樓 E301",
        note: "每週上課",
        url: "https://catalog.cgu.edu.tw/coursedata?sectionid=E5504"
      },
      F6605: {
        semester: "114/2",
        teacher: "魏志達",
        department: "資工系",
        gradeClass: "4-甲",
        courseCode: "IT4999(2)",
        title: "軟硬體專題(2)",
        sectionId: "F6605",
        time: "星期五 7 ~ 8",
        classroom: "專題教室",
        note: "每週上課",
        url: "https://catalog.cgu.edu.tw/coursedata?sectionid=F6605"
      }
    };

    let currentSectionId = "A2337";

    function renderCourseHtml(course) {
      return `
        <div class="detail-row"><span class="detail-label">學年/學期</span>${course.semester}</div>
        <div class="detail-row"><span class="detail-label">授課教師</span>${course.teacher}</div>
        <div class="detail-row"><span class="detail-label">開課單位</span>${course.department}</div>
        <div class="detail-row"><span class="detail-label">年級-班別</span>${course.gradeClass}</div>
        <div class="detail-row"><span class="detail-label">科目代號</span>${course.courseCode}</div>
        <div class="detail-row"><span class="detail-label">課程名稱</span>${course.title}</div>
        <div class="detail-row"><span class="detail-label">開課序號</span>${course.sectionId}</div>
        <div class="detail-row"><span class="detail-label">上課時間</span>${course.time}</div>
        <div class="detail-row"><span class="detail-label">上課地點</span>${course.classroom}</div>
        <div class="detail-row"><span class="detail-label">備註</span>${course.note}</div>
        <a class="detail-link" href="${course.url}" target="_blank">查看原始頁面</a>
      `;
    }

    function showCourse(sectionId) {
      currentSectionId = sectionId;
      const course = courseData[sectionId];
      const panel = document.getElementById("detailPanel");
      const modalContent = document.getElementById("modalContent");

      panel.innerHTML = `<h2 class="detail-title">課程詳細資料</h2>${renderCourseHtml(course)}`;
      modalContent.innerHTML = renderCourseHtml(course);
    }

    function changeResult() {
      const myTable = document.getElementById("csie");
      myTable.rows[1].cells[2].innerHTML = "李春良";
      showCourse("A2337");
    }

    function openModal() {
      const course = courseData[currentSectionId];
      document.getElementById("modalContent").innerHTML = renderCourseHtml(course);
      document.getElementById("modalMask").style.display = "block";
      document.getElementById("courseModal").style.display = "block";
    }

    function closeModal() {
      document.getElementById("modalMask").style.display = "none";
      document.getElementById("courseModal").style.display = "none";
    }

    showCourse("A2337");
  </script>
</body>
</html>
