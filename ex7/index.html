<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打字機消消樂</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background-color: #f5f5f5;
    }

    h1 {
      margin-bottom: 20px;
    }

    #word-area {
      min-height: 120px;
      padding: 15px;
      border: 2px solid #ccc;
      background-color: white;
      margin-bottom: 20px;
    }

    .word {
      display: inline-block;
      margin: 8px;
      padding: 8px 12px;
      background-color: #0d6efd;
      color: white;
      border-radius: 8px;
      font-size: 20px;
    }

    #input-box {
      padding: 10px;
      font-size: 18px;
      width: 250px;
    }

    #msg {
      margin-top: 15px;
      font-weight: bold;
      color: red;
    }

    #status {
      margin-top: 15px;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>打字機消消樂</h1>

  <div id="word-area"></div>

  <input type="text" id="input-box" placeholder="請輸入字串">
  <button id="submit-btn">送出</button>

  <div id="msg"></div>
  <div id="status"></div>

  <script src="script.js"></script>
</body>
</html>
